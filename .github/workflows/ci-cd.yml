name: CI & CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build app
        run: npm run build
        env:
          VITE_WP_BASE_URL: http://api.caojiantao.site:1024

      - name: 📂 Sync files
        uses: milanmk/actions-file-deployer@master
        with:
          remote-protocol: sftp
          remote-host: pi.caojiantao.site
          remote-port: 2048
          remote-user: root
          remote-password: ${{ secrets.PASSWORD }}
          sync: full
          local-path: dist/
          remote-path: /var/www/wordpick
